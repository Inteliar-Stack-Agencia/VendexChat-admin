name = "vendexchat-domain-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespace ────────────────────────────────────────────────────────────
# Crear con: wrangler kv namespace create DOMAIN_CACHE
# Reemplazar los IDs por los reales después de crear
[[kv_namespaces]]
binding = "DOMAIN_CACHE"
id = "REPLACE_WITH_REAL_KV_ID"
preview_id = "REPLACE_WITH_REAL_KV_PREVIEW_ID"

# ─── Variables de entorno ─────────────────────────────────────────────────────
[vars]
STOREFRONT_URL = "https://vendexchat.app"
SUPABASE_URL = "https://REPLACE.supabase.co"

# ─── Secrets (configurar via CLI) ────────────────────────────────────────────
# wrangler secret put SUPABASE_SERVICE_KEY
# (pegar el service_role key de Supabase — nunca commitear este valor)

# ─── Rutas ───────────────────────────────────────────────────────────────────
# Las rutas se configuran en el Cloudflare Dashboard al agregar
# cada Custom Hostname del tenant. No se necesita una ruta wildcard fija.
#
# Alternativa con zona propia:
# [[routes]]
# pattern = "servidores.vendexchat.app/*"
# zone_name = "vendexchat.app"
